name: fixme_app
description: A mobile app for repair services
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ">=3.3.0 <4.0.0"
  flutter: ">=3.16.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.2
  intl: ^0.20.0
  carousel_slider: ^5.1.1
  animate_do: ^2.1.0
  shared_preferences: ^2.2.2
  flutter_map: ^8.1.1
  latlong2: ^0.9.1
  http: ^1.2.2
  audioplayers: ^6.0.0

  # --- Firebase (align on Core v3 / Auth v5) ---
  firebase_core: ^3.0.0
  firebase_auth: ^5.0.0
  cloud_firestore: ^5.0.0
  firebase_storage: ^12.0.0
  firebase_messaging: ^15.0.0
  firebase_app_check: ^0.3.0
  flutter_local_notifications: ^17.2.0  
  vibration: 3.1.4
  flutter_riverpod: ^3.0.0

  google_sign_in: ^6.2.1
  image_picker: ^1.1.0

  # --- Location & maps ---
  geolocator: ^10.0.0
  geocoding: ^2.2.0
  flutter_osm_plugin: ^1.4.2
  geoflutterfire_plus: 0.0.24   # ⬅️ replaced geoflutterfire2

  # --- UI/UX ---
  badges: ^3.1.1
  cached_network_image: ^3.3.1
  rating_dialog: ^2.0.4
  flutter_rating_bar: ^4.0.1
  url_launcher: ^6.3.0
  package_info_plus: ^8.0.0
 
  
  fl_chart: ^0.55.2
  socket_io_client: ^3.1.4
  change_app_package_name: ^1.5.0


dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_native_splash: ^2.3.1

flutter:
  uses-material-design: true
  generate: true

  assets:
    - assets/icons/
    - assets/images/chat_bg.jpg
    - assets/images/car.png
    - assets/fonts/
    - assets/sounds/message.mp3
    - assets/sounds/send.mp3
    - assets/sounds/success.mp3
    - assets/sounds/arrival.mp3

  fonts:
    - family: NotoNastaliq
      fonts:
        - asset: assets/fonts/NotoNastaliqUrdu-VariableFont_wght.ttf

flutter_native_splash:
  color: "#01411C"
  image: assets/icons/Home.png
  android: true
  ios: true
  android_gravity: center

